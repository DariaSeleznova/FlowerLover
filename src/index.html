<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowerLover</title>
    <script src="./index.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Spline+Sans:wght@300..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <div class="header_content">

                <div class="logo">
                    <img src="./assets/logo.png" alt="FlowerLover">
                </div>

                <div class="mobile-btn">
                    <button class="search" id="searchBtn">
                        <img src="./assets/search.png" alt="">
                    </button>
                    <input type="text" class="search-input">
                    <button class="burger-menu" id="burger-menu">
                        <img src="./assets/burgermenu.png" alt="">
                    </button>
                </div>

                <nav class="menu">

                    <button class="close-btn" id="closeBtn">×</button>

                    <a href="#">Головна</a>
                    <a href="#">Каталог</a>
                    <a href="#">Про нас</a>
                    <a href="#">Як замовити</a>
                    <a href="#">Відгуки</a>
                    <a href="#">Контакти</a>

                </nav>

            </div>
        </div>
    </header>
    <section class="hero">
        <div class="container hero__section">
            <div class="hero__content">
                <p class="hero__subtitle">Неймовірні</p>
                <div class="hero__headline">
                    <h1 class="hero__title">БУКЕТИ</h1>
                    <p class="hero__subtitle">зі свіжих квітів</p>
                </div>
                <p class="hero__description">З доставкою по Києву протягом 1 години</p>
                <button class="hero__btn">Замовити квіти</button>
            </div>
            <div class="hero__features">
                <div class="features">
                    <img src="./assets/hero/flower.png" alt="">
                    <p>Щоденне оновлення свіжих квітів</p>
                </div>
                <div class="features">
                    <img src="./assets/hero/geolocation.png" alt="">
                    <p>безкоштовна доставка в будь яку точку міста</p>
                </div>
                <div class="features">
                    <img src="./assets/hero/map.png" alt="">
                    <p>більше 1000 сортів квітів з усього світу</p>
                </div>
            </div>
        </div>

    </section>
    <section></section>
    <section></section>
    <section></section>
    <section></section>
    <footer></footer>
</body>

</html>
